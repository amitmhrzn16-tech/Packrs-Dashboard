<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Packrs Courier</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #3aafa9;
      --primary-dark: #2b9a94;
      --primary-light: #e8f6f5;
      --bg: #f0f4f4;
      --bg-card: #ffffff;
      --text: #1a1a2e;
      --text-secondary: #6b7280;
      --border: #e5e7eb;
      --danger: #ef4444;
      --shadow: 0 4px 12px rgba(0,0,0,0.08);
      --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
      --radius: 10px;
      --radius-sm: 6px;
      --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* ─── Login Container ───────────────── */
    .login-wrapper {
      width: 100%;
      max-width: 440px;
    }

    .login-brand {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-brand .logo-icon {
      width: 56px;
      height: 56px;
      background: var(--text);
      border-radius: var(--radius);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
    }

    .login-brand .logo-icon svg {
      width: 32px;
      height: 32px;
      fill: none;
      stroke: #fff;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .login-brand h1 {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text);
    }

    .login-brand h1 span {
      color: var(--primary);
    }

    .login-brand p {
      color: var(--text-secondary);
      font-size: 13px;
      margin-top: 4px;
    }

    /* ─── Card ──────────────────────────── */
    .login-card {
      background: var(--bg-card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .login-card-header {
      padding: 24px 28px 0;
      text-align: center;
    }

    .login-card-header h2 {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }

    .login-card-header p {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    .login-card-body {
      padding: 24px 28px 28px;
    }

    /* ─── Form ──────────────────────────── */
    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap .input-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      color: var(--text-secondary);
    }

    .input-wrap .input-icon svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .form-control {
      width: 100%;
      padding: 10px 12px 10px 40px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 13.5px;
      font-family: var(--font);
      color: var(--text);
      background: #fff;
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
    }

    .form-control:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(58,175,169,0.12);
    }

    .form-control::placeholder {
      color: #9ca3af;
    }

    .form-control.error {
      border-color: var(--danger);
      box-shadow: 0 0 0 3px rgba(239,68,68,0.1);
    }

    .toggle-pw {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-secondary);
      padding: 4px;
    }

    .toggle-pw svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .form-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .remember-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 13px;
      color: var(--text-secondary);
      user-select: none;
    }

    .remember-wrap input {
      accent-color: var(--primary);
      width: 15px;
      height: 15px;
      cursor: pointer;
    }

    .forgot-link {
      font-size: 13px;
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    .forgot-link:hover {
      text-decoration: underline;
    }

    /* ─── Button ────────────────────────── */
    .btn-login {
      width: 100%;
      padding: 11px 20px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 700;
      font-family: var(--font);
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-login:hover {
      background: var(--primary-dark);
    }

    .btn-login:active {
      transform: scale(0.99);
    }

    .btn-login:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .btn-login .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ─── Error Message ─────────────────── */
    .error-msg {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: var(--danger);
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 16px;
      display: none;
      align-items: center;
      gap: 8px;
    }

    .error-msg.show {
      display: flex;
    }

    .error-msg svg {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      flex-shrink: 0;
    }

    /* ─── Track Link ────────────────────── */
    .track-link {
      text-align: center;
      margin-top: 16px;
    }

    .track-link a {
      font-size: 13px;
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    .track-link a:hover {
      text-decoration: underline;
    }

    /* ─── Footer ────────────────────────── */
    .login-footer {
      text-align: center;
      margin-top: 32px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    .login-footer span {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    .login-footer .dalfa-logo {
      margin-top: 6px;
      font-size: 20px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.5px;
    }

    .login-footer .dalfa-logo em {
      font-style: normal;
      color: #4caf50;
    }

    .login-footer .dalfa-sub {
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-secondary);
      font-weight: 600;
    }

    /* ========================================
       STEP 2 — Role Selection
       ======================================== */
    .step { display: none; }
    .step.active { display: block; }

    .user-greeting {
      text-align: center;
      margin-bottom: 24px;
    }

    .user-greeting .avatar {
      width: 56px;
      height: 56px;
      background: var(--primary);
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .user-greeting h3 {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }

    .user-greeting p {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    /* ─── Role Grid ─────────────────────── */
    .role-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .role-card {
      background: #fff;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 14px;
      text-align: center;
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
    }

    .role-card:hover {
      border-color: var(--primary);
      background: var(--primary-light);
      box-shadow: 0 2px 8px rgba(58,175,169,0.12);
    }

    .role-card.selected {
      border-color: var(--primary);
      background: var(--primary-light);
    }

    .role-card .check-mark {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 20px;
      height: 20px;
      background: var(--primary);
      border-radius: 50%;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .role-card.selected .check-mark {
      display: flex;
    }

    .role-card .check-mark svg {
      width: 12px;
      height: 12px;
      fill: none;
      stroke: #fff;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .role-card .role-icon {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-sm);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      margin-bottom: 8px;
    }

    .role-card .role-icon.teal { background: var(--primary-light); }
    .role-card .role-icon.blue { background: #eff6ff; }
    .role-card .role-icon.purple { background: #f5f3ff; }
    .role-card .role-icon.amber { background: #fffbeb; }
    .role-card .role-icon.green { background: #ecfdf5; }
    .role-card .role-icon.red { background: #fef2f4; }

    .role-card .role-name {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 2px;
    }

    .role-card .role-desc {
      font-size: 11px;
      color: var(--text-secondary);
    }

    .role-card.disabled {
      opacity: 0.4;
      cursor: not-allowed;
      pointer-events: none;
    }

    .btn-back {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: var(--radius-sm);
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 600;
      font-family: var(--font);
      cursor: pointer;
      transition: all 0.15s;
      width: 100%;
      margin-top: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn-back:hover {
      background: var(--bg);
    }

    @media (max-width: 480px) {
      .login-wrapper { max-width: 100%; }
      .login-card-body { padding: 20px; }
      .role-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="login-wrapper">
    <!-- Brand -->
    <div class="login-brand">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24">
          <path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/>
          <path d="m3.3 7 8.7 5 8.7-5"/>
          <path d="M12 22V12"/>
        </svg>
      </div>
      <h1><span>Packrs</span> Courier</h1>
      <p>Delivery Management Software</p>
    </div>

    <!-- ════════════════════════════════════
         STEP 1 — Login Form
         ════════════════════════════════════ -->
    <div id="step-login" class="step active">
      <div class="login-card">
        <div class="login-card-header">
          <h2>Login to DMS Admin</h2>
          <p>Enter your credentials to continue</p>
        </div>
        <div class="login-card-body">
          <div id="login-error" class="error-msg">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <span id="login-error-text">Invalid email or password</span>
          </div>

          <form id="login-form" autocomplete="on">
            <div class="form-group">
              <label class="form-label" for="email">Email Address</label>
              <div class="input-wrap">
                <span class="input-icon">
                  <svg viewBox="0 0 24 24"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                </span>
                <input type="email" id="email" class="form-control" placeholder="you@example.com" required autocomplete="email" />
              </div>
            </div>

            <div class="form-group">
              <label class="form-label" for="password">Password</label>
              <div class="input-wrap">
                <span class="input-icon">
                  <svg viewBox="0 0 24 24"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                </span>
                <input type="password" id="password" class="form-control" placeholder="Enter your password" required autocomplete="current-password" />
                <button type="button" class="toggle-pw" onclick="togglePassword()" title="Toggle password visibility">
                  <svg id="eye-icon" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
              </div>
            </div>

            <div class="form-row">
              <label class="remember-wrap">
                <input type="checkbox" id="remember" />
                Remember Me
              </label>
              <a href="#" class="forgot-link">Forgot password?</a>
            </div>

            <button type="submit" class="btn-login" id="btn-sign-in">
              <span id="btn-text">Sign In</span>
            </button>
          </form>

          <div class="track-link">
            <a href="#">Track Your Package</a>
          </div>
        </div>
      </div>
    </div>

    <!-- ════════════════════════════════════
         STEP 2 — Role Selection
         ════════════════════════════════════ -->
    <div id="step-role" class="step">
      <div class="login-card">
        <div class="login-card-body">
          <div class="user-greeting">
            <div class="avatar" id="user-avatar">AM</div>
            <h3 id="user-name">Welcome back!</h3>
            <p>Select a role to continue</p>
          </div>

          <div class="role-grid" id="role-grid">
            <!-- Roles populated by JS -->
          </div>

          <button type="button" class="btn-login" id="btn-continue" style="margin-top: 16px;" disabled>
            Continue
          </button>

          <button type="button" class="btn-back" id="btn-back">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            Back to Login
          </button>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="login-footer">
      <span>Powered by</span>
      <div class="dalfa-logo">d<em>a</em>lfa</div>
      <div class="dalfa-sub">Solutions</div>
    </div>
  </div>

  <script>
    // ─── Role Definitions ─────────────────
    const ALL_ROLES = [
      { id: 'admin',        name: 'Admin',        desc: 'Full system access',       icon: '&#x1f6e1;', color: 'teal' },
      { id: 'subadmin',     name: 'Sub Admin',    desc: 'Limited admin access',     icon: '&#x1f465;', color: 'blue' },
      { id: 'vendor',       name: 'Vendor',       desc: 'Manage shipments',         icon: '&#x1f4e6;', color: 'purple' },
      { id: 'rider',        name: 'Rider',        desc: 'Delivery operations',      icon: '&#x1f6f5;', color: 'amber' },
      { id: 'finance',      name: 'Finance',      desc: 'Billing & invoices',       icon: '&#x1f4b0;', color: 'green' },
      { id: 'finance_head', name: 'Finance Head', desc: 'Finance oversight',        icon: '&#x1f4ca;', color: 'red' },
    ];

    let selectedRole = null;

    // ─── DOM refs ─────────────────────────
    const stepLogin = document.getElementById('step-login');
    const stepRole  = document.getElementById('step-role');
    const loginForm = document.getElementById('login-form');
    const errorBox  = document.getElementById('login-error');
    const errorText = document.getElementById('login-error-text');
    const btnSignIn = document.getElementById('btn-sign-in');
    const btnText   = document.getElementById('btn-text');
    const btnContinue = document.getElementById('btn-continue');
    const btnBack   = document.getElementById('btn-back');
    const roleGrid  = document.getElementById('role-grid');

    // ─── Toggle Password ──────────────────
    function togglePassword() {
      const pw = document.getElementById('password');
      const icon = document.getElementById('eye-icon');
      if (pw.type === 'password') {
        pw.type = 'text';
        icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
      } else {
        pw.type = 'password';
        icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
      }
    }

    // ─── Login Submit ─────────────────────
    loginForm.addEventListener('submit', function(e) {
      e.preventDefault();
      errorBox.classList.remove('show');

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showError('Please enter both email and password.');
        return;
      }

      // Show loading state
      btnSignIn.disabled = true;
      btnText.textContent = '';
      const spinner = document.createElement('span');
      spinner.className = 'spinner';
      btnSignIn.insertBefore(spinner, btnText);

      // Simulate authentication (replace with real API call)
      setTimeout(function() {
        spinner.remove();
        btnText.textContent = 'Sign In';
        btnSignIn.disabled = false;

        // For demo: accept any valid email + password (min 6 chars)
        if (password.length < 6) {
          showError('Invalid email or password.');
          return;
        }

        // Store user info
        const userName = email.split('@')[0].replace(/[._]/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
        const initials = userName.split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();

        sessionStorage.setItem('packrs_email', email);
        sessionStorage.setItem('packrs_name', userName);
        sessionStorage.setItem('packrs_initials', initials);

        // Determine available roles for this user (replace with real API response)
        const userRoles = ALL_ROLES.map(r => r.id); // All roles available for demo

        showRoleSelection(userName, initials, userRoles);
      }, 800);
    });

    function showError(msg) {
      errorText.textContent = msg;
      errorBox.classList.add('show');
    }

    // ─── Role Selection ───────────────────
    function showRoleSelection(name, initials, availableRoles) {
      document.getElementById('user-avatar').textContent = initials;
      document.getElementById('user-name').textContent = 'Welcome, ' + name + '!';

      // Build role cards
      roleGrid.innerHTML = '';
      ALL_ROLES.forEach(function(role) {
        const isAvailable = availableRoles.includes(role.id);
        const card = document.createElement('div');
        card.className = 'role-card' + (isAvailable ? '' : ' disabled');
        card.dataset.role = role.id;
        card.innerHTML =
          '<div class="check-mark"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>' +
          '<div class="role-icon ' + role.color + '">' + role.icon + '</div>' +
          '<div class="role-name">' + role.name + '</div>' +
          '<div class="role-desc">' + role.desc + '</div>';

        if (isAvailable) {
          card.addEventListener('click', function() {
            document.querySelectorAll('.role-card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            selectedRole = role.id;
            btnContinue.disabled = false;
          });
        }

        roleGrid.appendChild(card);
      });

      // Transition to step 2
      stepLogin.classList.remove('active');
      stepRole.classList.add('active');
    }

    // ─── Continue with Role ───────────────
    btnContinue.addEventListener('click', function() {
      if (!selectedRole) return;

      btnContinue.disabled = true;
      btnContinue.innerHTML = '<span class="spinner"></span>';

      // Store selection
      sessionStorage.setItem('packrs_role', selectedRole);
      sessionStorage.setItem('packrs_authenticated', 'true');

      // Redirect to dashboard
      setTimeout(function() {
        window.location.href = 'index.html';
      }, 500);
    });

    // ─── Back Button ──────────────────────
    btnBack.addEventListener('click', function() {
      selectedRole = null;
      btnContinue.disabled = true;
      btnContinue.innerHTML = 'Continue';
      stepRole.classList.remove('active');
      stepLogin.classList.add('active');
    });

    // ─── If already authenticated, go to dashboard ──
    if (sessionStorage.getItem('packrs_authenticated') === 'true') {
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
