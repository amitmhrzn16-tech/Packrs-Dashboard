<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Packrs Courier</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #3aafa9;
      --primary-dark: #2b9a94;
      --primary-light: #e8f6f5;
      --bg: #f0f4f4;
      --bg-card: #ffffff;
      --text: #1a1a2e;
      --text-secondary: #6b7280;
      --border: #e5e7eb;
      --danger: #ef4444;
      --shadow: 0 4px 12px rgba(0,0,0,0.08);
      --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
      --radius: 10px;
      --radius-sm: 6px;
      --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* ─── Login Container ───────────────── */
    .login-wrapper {
      width: 100%;
      max-width: 440px;
    }

    .login-brand {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-brand .logo-icon {
      width: 56px;
      height: 56px;
      background: var(--text);
      border-radius: var(--radius);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
    }

    .login-brand .logo-icon svg {
      width: 32px;
      height: 32px;
      fill: none;
      stroke: #fff;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .login-brand h1 {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text);
    }

    .login-brand h1 span {
      color: var(--primary);
    }

    .login-brand p {
      color: var(--text-secondary);
      font-size: 13px;
      margin-top: 4px;
    }

    /* ─── Card ──────────────────────────── */
    .login-card {
      background: var(--bg-card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .login-card-header {
      padding: 24px 28px 0;
      text-align: center;
    }

    .login-card-header h2 {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }

    .login-card-header p {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    .login-card-body {
      padding: 24px 28px 28px;
    }

    /* ─── Form ──────────────────────────── */
    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap .input-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      color: var(--text-secondary);
    }

    .input-wrap .input-icon svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .form-control {
      width: 100%;
      padding: 10px 12px 10px 40px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 13.5px;
      font-family: var(--font);
      color: var(--text);
      background: #fff;
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
    }

    .form-control:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(58,175,169,0.12);
    }

    .form-control::placeholder {
      color: #9ca3af;
    }

    .form-control.error {
      border-color: var(--danger);
      box-shadow: 0 0 0 3px rgba(239,68,68,0.1);
    }

    .toggle-pw {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-secondary);
      padding: 4px;
    }

    .toggle-pw svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .form-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .remember-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 13px;
      color: var(--text-secondary);
      user-select: none;
    }

    .remember-wrap input {
      accent-color: var(--primary);
      width: 15px;
      height: 15px;
      cursor: pointer;
    }

    .forgot-link {
      font-size: 13px;
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    .forgot-link:hover {
      text-decoration: underline;
    }

    /* ─── Button ────────────────────────── */
    .btn-login {
      width: 100%;
      padding: 11px 20px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 700;
      font-family: var(--font);
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-login:hover {
      background: var(--primary-dark);
    }

    .btn-login:active {
      transform: scale(0.99);
    }

    .btn-login:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .btn-login .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ─── Error Message ─────────────────── */
    .error-msg {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: var(--danger);
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 16px;
      display: none;
      align-items: center;
      gap: 8px;
    }

    .error-msg.show {
      display: flex;
    }

    .error-msg svg {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      flex-shrink: 0;
    }

    /* ─── Track Link ────────────────────── */
    .track-link {
      text-align: center;
      margin-top: 16px;
    }

    .track-link a {
      font-size: 13px;
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    .track-link a:hover {
      text-decoration: underline;
    }

    /* ─── Footer ────────────────────────── */
    .login-footer {
      text-align: center;
      margin-top: 32px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    .login-footer span {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    .login-footer .dalfa-logo {
      margin-top: 6px;
      font-size: 20px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.5px;
    }

    .login-footer .dalfa-logo em {
      font-style: normal;
      color: #4caf50;
    }

    .login-footer .dalfa-sub {
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-secondary);
      font-weight: 600;
    }

    /* ─── Role Selector ─────────────────── */
    .role-selector {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }

    .role-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 14px 10px;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      background: #fff;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .role-btn:hover {
      border-color: var(--primary);
      background: var(--primary-light);
    }

    .role-btn.active {
      border-color: var(--primary);
      background: var(--primary-light);
      box-shadow: 0 0 0 3px rgba(58,175,169,0.15);
    }

    .role-btn .role-icon {
      color: var(--text-secondary);
      transition: color 0.2s;
    }

    .role-btn.active .role-icon {
      color: var(--primary);
    }

    .role-btn .role-label {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }

    .role-btn .role-desc {
      font-size: 11px;
      color: var(--text-secondary);
    }

    @media (max-width: 480px) {
      .login-wrapper { max-width: 100%; }
      .login-card-body { padding: 20px; }
    }
  </style>
</head>
<body>

  <div class="login-wrapper">
    <!-- Brand -->
    <div class="login-brand">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24">
          <path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/>
          <path d="m3.3 7 8.7 5 8.7-5"/>
          <path d="M12 22V12"/>
        </svg>
      </div>
      <h1><span>Packrs</span> Courier</h1>
      <p>Delivery Management Software</p>
    </div>

    <div>
      <div class="login-card">
        <div class="login-card-header">
          <h2>Login to Packrs DMS</h2>
          <p>Select your role and enter credentials</p>
        </div>
        <div class="login-card-body">
          <div id="login-error" class="error-msg">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <span id="login-error-text">Invalid email or password</span>
          </div>

          <form id="login-form" autocomplete="on">
            <!-- Role Selector -->
            <div class="role-selector">
              <button type="button" class="role-btn active" data-role="admin" onclick="selectRole('admin')">
                <span class="role-icon"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg></span>
                <span class="role-label">Admin</span>
                <span class="role-desc">Full dashboard access</span>
              </button>
              <button type="button" class="role-btn" data-role="rider" onclick="selectRole('rider')">
                <span class="role-icon"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M6 20v-2a6 6 0 0 1 12 0v2"/><path d="M9 14l-3 6"/><path d="M15 14l3 6"/></svg></span>
                <span class="role-label">Rider</span>
                <span class="role-desc">Delivery portal</span>
              </button>
            </div>
            <input type="hidden" id="login-role" value="admin" />

            <div class="form-group">
              <label class="form-label" for="email">Email Address</label>
              <div class="input-wrap">
                <span class="input-icon">
                  <svg viewBox="0 0 24 24"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                </span>
                <input type="email" id="email" class="form-control" placeholder="you@example.com" required autocomplete="email" />
              </div>
            </div>

            <div class="form-group">
              <label class="form-label" for="password">Password</label>
              <div class="input-wrap">
                <span class="input-icon">
                  <svg viewBox="0 0 24 24"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                </span>
                <input type="password" id="password" class="form-control" placeholder="Enter your password" required autocomplete="current-password" />
                <button type="button" class="toggle-pw" onclick="togglePassword()" title="Toggle password visibility">
                  <svg id="eye-icon" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
              </div>
            </div>

            <div class="form-row">
              <label class="remember-wrap">
                <input type="checkbox" id="remember" />
                Remember Me
              </label>
              <a href="#" class="forgot-link">Forgot password?</a>
            </div>

            <button type="submit" class="btn-login" id="btn-sign-in">
              <span id="btn-text">Sign In</span>
            </button>
          </form>

          <div class="track-link">
            <a href="#">Track Your Package</a>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="login-footer">
      <span>Powered by</span>
      <div class="dalfa-logo">d<em>a</em>lfa</div>
      <div class="dalfa-sub">Solutions</div>
    </div>
  </div>

  <script>
    // ─── DOM refs ─────────────────────────
    const loginForm = document.getElementById('login-form');
    const errorBox  = document.getElementById('login-error');
    const errorText = document.getElementById('login-error-text');
    const btnSignIn = document.getElementById('btn-sign-in');
    const btnText   = document.getElementById('btn-text');

    // ─── Role Selection ──────────────────
    function selectRole(role) {
      document.getElementById('login-role').value = role;
      document.querySelectorAll('.role-btn').forEach(function(btn) {
        btn.classList.toggle('active', btn.getAttribute('data-role') === role);
      });
    }

    // ─── Toggle Password ──────────────────
    function togglePassword() {
      const pw = document.getElementById('password');
      const icon = document.getElementById('eye-icon');
      if (pw.type === 'password') {
        pw.type = 'text';
        icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
      } else {
        pw.type = 'password';
        icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
      }
    }

    // ─── Login Submit ─────────────────────
    loginForm.addEventListener('submit', function(e) {
      e.preventDefault();
      errorBox.classList.remove('show');

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showError('Please enter both email and password.');
        return;
      }

      // Show loading state
      btnSignIn.disabled = true;
      btnText.textContent = '';
      const spinner = document.createElement('span');
      spinner.className = 'spinner';
      btnSignIn.insertBefore(spinner, btnText);

      // Simulate authentication (replace with real API call)
      setTimeout(function() {
        spinner.remove();
        btnText.textContent = 'Sign In';
        btnSignIn.disabled = false;

        // For demo: accept any valid email + password (min 6 chars)
        if (password.length < 6) {
          showError('Invalid email or password.');
          return;
        }

        // Store user info
        const userName = email.split('@')[0].replace(/[._]/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
        const initials = userName.split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();
        const role = document.getElementById('login-role').value;

        sessionStorage.setItem('packrs_email', email);
        sessionStorage.setItem('packrs_name', userName);
        sessionStorage.setItem('packrs_initials', initials);
        sessionStorage.setItem('packrs_role', role);
        sessionStorage.setItem('packrs_authenticated', 'true');

        // Redirect based on role
        if (role === 'rider') {
          window.location.href = 'rider-dashboard.html';
        } else {
          window.location.href = 'index.html';
        }
      }, 800);
    });

    function showError(msg) {
      errorText.textContent = msg;
      errorBox.classList.add('show');
    }

    // ─── If already authenticated, go to dashboard ──
    if (sessionStorage.getItem('packrs_authenticated') === 'true') {
      if (sessionStorage.getItem('packrs_role') === 'rider') {
        window.location.href = 'rider-dashboard.html';
      } else {
        window.location.href = 'index.html';
      }
    }
  </script>
</body>
</html>
